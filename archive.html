  <!-- Archive accordion styles -->
  <style>
    .archive-series-list {
      display: flex;
      flex-direction: column;
    }

    .series-divider {
      border-top: 1px solid var(--border);
    }

    .series-header {
      display: flex;
      align-items: center;
      gap: 24px;
      width: 100%;
      padding: 20px 0;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: var(--font);
      color: var(--text);
    }

    .series-thumb {
      width: 160px;
      flex-shrink: 0;
      border-radius: 2px;
    }
    .series-thumb img {
      width: 100%;
      height: auto;
      display: block;
      transition: opacity 0.2s ease;
    }
    .series-header:hover .series-thumb img {
      opacity: 0.75;
    }

    .series-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }
    .series-title {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .series-year {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .series-toggle {
      font-size: 18px;
      font-weight: 300;
      color: var(--muted);
      flex-shrink: 0;
      width: 24px;
      text-align: center;
      transition: transform 0.3s ease;
    }
    .archive-series.is-open .series-toggle {
      transform: rotate(45deg);
    }

    .series-body {
      height: 0;
      overflow: hidden;
      transition: height 0.4s ease;
    }

    .series-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding-bottom: 24px;
    }
    .series-grid-4 {
      grid-template-columns: repeat(4, 1fr);
    }
    .series-img {
      aspect-ratio: 3 / 4;
      overflow: hidden;
    }
    .series-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .series-thumb { width: 120px; }
      .series-header { gap: 16px; }
      .series-grid { grid-template-columns: repeat(2, 1fr); }
      .series-grid-4 { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 480px) {
      .series-thumb { width: 90px; }
      .series-title { font-size: 12px; }
      .series-grid, .series-grid-4 { grid-template-columns: 1fr; }
    }
  </style>

  <!-- Archive accordion interaction -->
  <script>
  document.querySelectorAll('[data-series]').forEach(function(series) {
    var btn = series.querySelector('.series-header');
    var body = series.querySelector('.series-body');
    btn.addEventListener('click', function() {
      if (series.classList.contains('is-open')) {
        // Collapse: set explicit height first, then animate to 0
        body.style.height = body.scrollHeight + 'px';
        requestAnimationFrame(function() {
          body.style.height = '0';
        });
        series.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
      } else {
        // Expand: animate from 0 to scrollHeight, then clear
        body.style.height = body.scrollHeight + 'px';
        series.classList.add('is-open');
        btn.setAttribute('aria-expanded', 'true');
        body.addEventListener('transitionend', function handler() {
          body.style.height = 'auto';
          body.removeEventListener('transitionend', handler);
        });
      }
    });
  });
  </script>
