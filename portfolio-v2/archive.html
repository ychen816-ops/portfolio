  <!-- Archive accordion interaction -->
  <script>
  document.querySelectorAll('[data-series]').forEach(function(series) {
    var btn = series.querySelector('.series-header');
    var body = series.querySelector('.series-body');
    btn.addEventListener('click', function() {
      if (series.classList.contains('is-open')) {
        body.style.height = body.scrollHeight + 'px';
        requestAnimationFrame(function() {
          body.style.height = '0';
        });
        series.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
      } else {
        body.style.height = body.scrollHeight + 'px';
        series.classList.add('is-open');
        btn.setAttribute('aria-expanded', 'true');
        body.addEventListener('transitionend', function handler() {
          body.style.height = 'auto';
          body.removeEventListener('transitionend', handler);
        });
      }
    });
  });
  </script>
