<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style D — Swiss Modern</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;800&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #ffffff;
    min-height: 100vh;
    display: flex;
    position: relative;
    overflow: hidden;
  }
  /* Visible grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
  }
  /* Red accent bar */
  .accent-bar {
    position: fixed;
    left: 0;
    top: 0;
    width: 6px;
    height: 100vh;
    background: #ff3300;
  }
  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px 64px 64px 48px;
  }
  .right {
    width: 40%;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px;
    border-left: 1px solid rgba(0,0,0,0.06);
  }
  .label {
    font-family: 'Nunito', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #ff3300;
    margin-bottom: 24px;
  }
  h1 {
    font-family: 'Archivo', sans-serif;
    font-size: clamp(3rem, 7vw, 5rem);
    font-weight: 800;
    color: #000;
    line-height: 0.95;
    margin-bottom: 24px;
    letter-spacing: -0.03em;
  }
  .subtitle {
    font-size: 15px;
    color: #666;
    line-height: 1.7;
    max-width: 400px;
  }
  .project-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .project-list li {
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .proj-num {
    font-family: 'Archivo', sans-serif;
    font-size: 32px;
    font-weight: 800;
    color: #ddd;
    min-width: 48px;
  }
  .proj-info {
    display: flex;
    flex-direction: column;
  }
  .proj-name {
    font-family: 'Archivo', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: #000;
  }
  .proj-year {
    font-size: 12px;
    color: #aaa;
    margin-top: 2px;
  }
  .red-shape {
    width: 48px;
    height: 48px;
    background: #ff3300;
    margin-top: 40px;
  }
  .meta {
    margin-top: 48px;
    font-size: 12px;
    color: #bbb;
  }
  .style-name {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Archivo', sans-serif;
    font-size: 13px;
    font-weight: 800;
    color: #ff3300;
    letter-spacing: 0.1em;
  }
  @media (max-width: 700px) {
    body { flex-direction: column; }
    .right { width: 100%; }
    .left { padding: 40px 24px; }
    .right { padding: 40px 24px; }
  }
</style>
</head>
<body>
  <div class="accent-bar"></div>
  <div class="left">
    <div class="label">Portfolio Preview</div>
    <h1>ANDREA<br>CHENG</h1>
    <p class="subtitle">Designer and artist. Visual communication, spatial installation, and code-driven experience.</p>
    <div class="red-shape"></div>
  </div>
  <div class="right">
    <ul class="project-list">
      <li>
        <span class="proj-num">01</span>
        <div class="proj-info">
          <span class="proj-name">Windowscape</span>
          <span class="proj-year">2025</span>
        </div>
      </li>
      <li>
        <span class="proj-num">02</span>
        <div class="proj-info">
          <span class="proj-name">Bias Bingo</span>
          <span class="proj-year">2025</span>
        </div>
      </li>
      <li>
        <span class="proj-num">03</span>
        <div class="proj-info">
          <span class="proj-name">Balcony Metamorphosis</span>
          <span class="proj-year">2024</span>
        </div>
      </li>
    </ul>
    <div class="meta">
      Minimal · Grid system · Red accent · Archivo + Nunito
    </div>
  </div>
  <div class="style-name">Style D — Swiss Modern</div>
</body>
</html>
