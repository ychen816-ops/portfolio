<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style B — Split Pastel</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    display: flex;
  }
  .left {
    flex: 1;
    background: #f5e6dc;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px;
  }
  .right {
    flex: 1;
    background: #e4dff0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 64px;
    position: relative;
  }
  .right::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
    background-size: 30px 30px;
  }
  .label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #b08870;
    margin-bottom: 20px;
  }
  h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 800;
    color: #1a1a1a;
    line-height: 1.05;
    margin-bottom: 24px;
  }
  .subtitle {
    font-size: 15px;
    color: #555;
    line-height: 1.7;
    max-width: 380px;
  }
  .badges {
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    z-index: 1;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    color: #1a1a1a;
  }
  .badge-1 { background: #c8f0d8; }
  .badge-2 { background: #f0f0c8; }
  .badge-3 { background: #f0d4e0; }
  .badge span { font-size: 18px; }
  .meta {
    margin-top: 40px;
    font-size: 12px;
    color: #999;
    position: relative;
    z-index: 1;
  }
  .style-name {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    font-weight: 700;
    color: #8070a0;
    letter-spacing: 0.1em;
  }
  @media (max-width: 700px) {
    body { flex-direction: column; }
    .left, .right { padding: 40px 24px; }
  }
</style>
</head>
<body>
  <div class="left">
    <div class="label">Portfolio Preview</div>
    <h1>Andrea<br>Cheng</h1>
    <p class="subtitle">Designer and artist. Visual communication, spatial installation, and interactive media.</p>
  </div>
  <div class="right">
    <div class="badges">
      <div class="badge badge-1"><span>🪟</span> Windowscape — 2025</div>
      <div class="badge badge-2"><span>🏠</span> Balcony Metamorphosis — 2024</div>
      <div class="badge badge-3"><span>🎲</span> Bias Bingo — 2025</div>
    </div>
    <div class="meta">
      Playful · Two-tone split · Grid overlay · Outfit font
    </div>
  </div>
  <div class="style-name">Style B — Split Pastel</div>
</body>
</html>
